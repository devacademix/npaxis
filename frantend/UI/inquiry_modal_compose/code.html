<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clinical Atelier | Send Inquiry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error": "#ba1a1a",
            "secondary-fixed": "#dae2ff",
            "outline-variant": "#c3c6d6",
            "on-surface-variant": "#434654",
            "surface-container-low": "#f2f4f6",
            "on-primary-fixed": "#001848",
            "secondary": "#4c5d8d",
            "primary": "#003d9b",
            "tertiary-fixed-dim": "#ffb59b",
            "primary-fixed-dim": "#b2c5ff",
            "on-secondary-fixed": "#021945",
            "on-error": "#ffffff",
            "surface-container": "#eceef0",
            "secondary-fixed-dim": "#b4c5fb",
            "surface-container-high": "#e6e8ea",
            "surface-dim": "#d8dadc",
            "surface-tint": "#0c56d0",
            "on-tertiary-container": "#ffc6b2",
            "on-tertiary": "#ffffff",
            "primary-container": "#0052cc",
            "primary-fixed": "#dae2ff",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "inverse-on-surface": "#eff1f3",
            "surface-container-highest": "#e0e3e5",
            "surface": "#f7f9fb",
            "tertiary-fixed": "#ffdbcf",
            "on-primary": "#ffffff",
            "surface-variant": "#e0e3e5",
            "on-tertiary-fixed": "#380d00",
            "inverse-surface": "#2d3133",
            "on-secondary-container": "#415382",
            "tertiary": "#7b2600",
            "on-error-container": "#93000a",
            "inverse-primary": "#b2c5ff",
            "on-background": "#191c1e",
            "surface-bright": "#f7f9fb",
            "background": "#f7f9fb",
            "on-primary-fixed-variant": "#0040a2",
            "on-primary-container": "#c4d2ff",
            "tertiary-container": "#a33500",
            "on-secondary-fixed-variant": "#344573",
            "error-container": "#ffdad6",
            "on-tertiary-fixed-variant": "#812800",
            "on-surface": "#191c1e",
            "outline": "#737685",
            "secondary-container": "#b6c8fe"
          },
          fontFamily: {
            "headline": ["Manrope", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3 {
      font-family: 'Manrope', sans-serif;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
    }
    .gradient-btn {
      background: linear-gradient(135deg, #003d9b 0%, #0052cc 100%);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Background Content (Simulated Profile Page) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-40">
<div class="max-w-6xl mx-auto p-12">
<div class="flex gap-12 items-start">
<div class="w-64 h-64 bg-surface-container-high rounded-lg overflow-hidden">
<img class="w-full h-full object-cover grayscale" data-alt="Professional female physician in white coat smiling in a modern medical office setting with soft natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFJysYwdz_dmN5V9MhtpayzeE_6TRl_oYF3Bkg0Jr6oTUrgwd6WUpjFQaoNNAh7wUpXZ8mcgCKIYAnXb9agYGdz5kL1JGUvxVqrbVYFiqINofKhTFR06kP8OEjFlGmFqHuoWJ36NkWqamM8FsHHTMeyXhQA7y9OtIVjDvRPnnKc2U75B3TZNvHNnjz9FRAHwjZ0l7hkn2G6klbLExbZ6Cx13QvI3vl-uDX1VGoEuWaXREU5agpQnxHgAf6mdJQ4pgWcf2l5Z4PIj8y"/>
</div>
<div class="flex-1 space-y-6">
<div class="h-12 w-1/3 bg-surface-container-high rounded-lg"></div>
<div class="h-4 w-1/4 bg-surface-container-high rounded-lg"></div>
<div class="space-y-4 pt-8">
<div class="h-4 w-full bg-surface-container-high rounded-lg"></div>
<div class="h-4 w-full bg-surface-container-high rounded-lg"></div>
<div class="h-4 w-2/3 bg-surface-container-high rounded-lg"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-on-surface/10 backdrop-blur-sm z-10"></div>
<!-- Inquiry Modal -->
<div class="relative z-20 w-full max-w-xl glass-effect border-0 rounded-lg shadow-[0px_12px_32px_rgba(25,28,30,0.06)] overflow-hidden">
<!-- Header -->
<div class="px-8 pt-8 pb-4 flex justify-between items-start">
<div class="space-y-1">
<span class="text-[0.6875rem] font-medium tracking-[0.05em] text-on-secondary-container uppercase font-label">New Inquiry</span>
<h2 class="text-2xl font-bold text-primary tracking-tight font-headline">Send Inquiry to Dr. Sarah Chen</h2>
</div>
<button class="p-2 text-outline hover:text-on-surface transition-colors rounded-full hover:bg-surface-container-high">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Modal Content -->
<form class="px-8 pb-8 space-y-8">
<!-- Patient/Preceptor Context Chip -->
<div class="flex items-center gap-4 p-4 rounded-lg bg-surface-container-low">
<div class="w-12 h-12 rounded-full overflow-hidden shrink-0">
<img class="w-full h-full object-cover" data-alt="Circular headshot profile of Dr. Sarah Chen, female doctor with a kind and professional expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_9V2Cu_dDJrfyLuPwXRsF6rWR-VidiXooBatfoOfArCv9KXGKxwJqp1eNRwZE710z0tOTiUShkwNQVQrj4q81nX4Qc4iiuYY2K2A2rYgoSv6cHy-7AOSkHnTDjawbh-Awb9RWcHn2Fo25rLsyVHmrFWrCYm4v4FUelLo8CgGcKSwfz2AYbRw7z6E__Hkgi6GpEAenYB2w0yKaD5wMwkQPIM7jXHnlYiRE4IACq7YagFiE1jx0eOBUc3l-b81UDwB2EX5wCptxty8J"/>
</div>
<div>
<p class="text-sm font-semibold text-on-surface">Dr. Sarah Chen</p>
<p class="text-xs text-on-surface-variant">Cardiology Specialist • Clinical Mentor</p>
</div>
<div class="ml-auto">
<span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-secondary-container text-on-secondary-container tracking-wider uppercase">
            Accepting Students
          </span>
</div>
</div>
<!-- Input Section -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-xs font-bold tracking-wider text-on-surface-variant uppercase font-label" for="message">Your Message</label>
<span class="text-[10px] text-outline font-medium">0 / 500 characters</span>
</div>
<textarea class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded-lg p-4 text-sm font-body text-on-surface placeholder:text-outline transition-all resize-none" id="message" placeholder="Briefly describe your interest and experience..." rows="5"></textarea>
</div>
<!-- Quick Attachments/Metadata (Asymmetric Layout Elements) -->
<div class="flex flex-wrap gap-3">
<button class="flex items-center gap-2 px-3 py-2 rounded-lg bg-surface-container-high text-on-secondary-container text-xs font-semibold hover:bg-surface-container hover:translate-x-1 transition-all" type="button">
<span class="material-symbols-outlined text-sm">attach_file</span>
<span>Attach CV</span>
</button>
<button class="flex items-center gap-2 px-3 py-2 rounded-lg bg-surface-container-high text-on-secondary-container text-xs font-semibold hover:bg-surface-container hover:translate-x-1 transition-all" type="button">
<span class="material-symbols-outlined text-sm">history_edu</span>
<span>Clinical Hours</span>
</button>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-6 pt-4">
<button class="text-sm font-bold text-outline hover:text-primary transition-colors uppercase tracking-widest font-label" type="button">
          Cancel
        </button>
<button class="gradient-btn text-on-primary px-8 py-3 rounded-full text-sm font-bold tracking-tight shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-2" type="submit">
<span>Send Inquiry</span>
<span class="material-symbols-outlined text-lg">send</span>
</button>
</div>
</form>
<!-- Footer Security Note -->
<div class="px-8 py-3 bg-surface-container-highest/50 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-outline">verified_user</span>
<p class="text-[10px] text-on-surface-variant font-medium">Encrypted HIPAA-compliant transmission. Your data is protected by Clinical Atelier standards.</p>
</div>
</div>
</body></html>
