<!-- Header Section -->
<div class="mb-8 text-center md:text-left">

<p class="text-on-surface-variant text-sm leading-relaxed">
                    An OTP has been sent to your email. Enter the code and your new password below.
                </p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- OTP Input (6-digit) -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-semibold text-outline uppercase tracking-[0.05em]">6-digit OTP</label>
<div class="flex justify-between gap-2">
<input class="w-full h-14 text-center text-xl font-bold bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-xl font-bold bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-xl font-bold bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-xl font-bold bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-xl font-bold bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-xl font-bold bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200" maxlength="1" placeholder="•" type="text"/>
</div>
<div class="flex justify-end pt-1">
<button class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" type="button">Resend OTP</button>
</div>
</div>
<!-- New Password -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-semibold text-outline uppercase tracking-[0.05em]">New Password</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200 pr-12" placeholder="Enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="block text-[0.6875rem] font-semibold text-outline uppercase tracking-[0.05em]">Confirm New Password</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-0 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest rounded transition-all duration-200 pr-12" placeholder="Re-enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>

<div class="pt-4">
<button class="w-full h-12 rounded-full bg-gradient-to-br from-[#003d9b] to-[#0052cc] text-white font-bold tracking-tight hover:opacity-90 active:scale-[0.98] transition-all shadow-sm" type="submit">
