spring:
  application:
    name: npaxis
  config:
    import: optional:file:secrets.properties

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/npaxis}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:team@npaxis.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          trust: "*"
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          debug: false

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100
      thread-name-prefix: npaxis-async-

security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration:
      access: ${JWT_EXPIRATION_ACCESS:900000}
      refresh: ${JWT_EXPIRATION_REFRESH:604800000}

npaxis:
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@npaxis.com}
    from-name: ${EMAIL_FROM_NAME:NPaxis Platform}
  storage:
    local-directory: ${STORAGE_LOCAL_DIRECTORY:uploads}
    allowed-extensions: ${STORAGE_ALLOWED_EXTENSIONS:pdf,png,jpg,jpeg}
    cloud:
      bucket-name: ${CLOUD_BUCKET_NAME:npaxis-files}
      region: ${CLOUD_REGION:us-east-1}
      access-key: ${CLOUD_ACCESS_KEY:}
      secret-key: ${CLOUD_SECRET_KEY:}

payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    checkout:
      success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/subscription/success}
      cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/subscription/cancel}
    portal:
      return-url: ${STRIPE_PORTAL_RETURN_URL:http://localhost:5173/dashboard}
    api-version: ${STRIPE_API_VERSION:2024-12-18.acacia}
    max-network-retries: ${STRIPE_MAX_NETWORK_RETRIES:3}
    connect-timeout-ms: ${STRIPE_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${STRIPE_READ_TIMEOUT_MS:10000}
    currency: ${STRIPE_CURRENCY:usd}
    trial:
      period-days: ${STRIPE_TRIAL_DAYS:14}

# ============================================
# Logging Configuration for Development
# ============================================
logging:
  level:
    root: DEBUG
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data: DEBUG
    org.hibernate: WARN
    org.postgresql: INFO
    com.digitalearn.npaxis: DEBUG

  # Log file configuration
  file:
    name: logs/${spring.application.name}.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 5GB

  # Log patterns
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36}:%line - %msg%n"

# ============================================
# Server Configuration
# ============================================
server:
  port: 8080
  servlet:
    context-path: /api/v1
