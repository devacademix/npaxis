<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Document PDF</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background-color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 40px;
        }

        /* Header */
        .header {
            width: 100%;
            text-align: center;
            border-bottom: 2px solid #0A2540;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #0A2540;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 12px;
        }

        /* Title */
        .title {
            text-align: center;
            margin-bottom: 25px;
        }

        .title h2 {
            color: #0A2540;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .title .subtitle {
            color: #666;
            font-size: 13px;
            font-style: italic;
        }

        /* Content */
        .content {
            line-height: 1.8;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .content p {
            margin-bottom: 12px;
        }

        /* Two Column Section */
        .two-column {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .two-column td {
            vertical-align: top;
            width: 50%;
            padding: 15px;
        }

        .two-column .column-title {
            color: #0A2540;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .two-column .column-content {
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }

        /* Table for structured data */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 12px;
        }

        .data-table th {
            background-color: #f5f5f5;
            color: #0A2540;
            padding: 10px;
            text-align: left;
            font-weight: bold;
            border-bottom: 2px solid #0A2540;
        }

        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #e5e5e5;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 10px;
            color: #999;
            line-height: 1.6;
        }

        .signature-section {
            margin-top: 30px;
            display: table;
            width: 100%;
        }

        .signature-box {
            display: table-cell;
            width: 33.33%;
            text-align: center;
            vertical-align: bottom;
            padding: 20px;
            font-size: 11px;
        }

        .signature-box .line {
            border-top: 1px solid #000;
            width: 100px;
            margin: 20px auto 5px;
        }

    </style>
</head>

<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>NPaxis</h1>
        <p>Professional Preceptor Network</p>
    </div>

    <!-- Title -->
    <div class="title">
        <h2 th:text="${documentTitle}"></h2>
        <div class="subtitle" th:if="${documentSubtitle}" th:text="${documentSubtitle}"></div>
    </div>

    <!-- Main Content -->
    <div class="content" th:if="${content}" th:utext="${content}"></div>

    <!-- Generic Data Display -->
    <div th:if="${data}">
        <table class="two-column">
            <tr th:each="entry : ${data.entrySet()}">
                <td>
                    <div class="column-title" th:text="${entry.key}"></div>
                    <div class="column-content" th:text="${entry.value}"></div>
                </td>
            </tr>
        </table>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>© 2026 Digitalearn Solution Pvt. Ltd. All rights reserved.</p>
        <p>Document generated from NPaxis | <span
                th:text="${#temporals.format(#dates.createNow(), 'dd MMM yyyy HH:mm')}"></span></p>
    </div>

</div>
</body>
</html>
