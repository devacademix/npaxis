spring:
  config:
    activate:
      on-profile: prod

  application:
    name: npaxis

  # ============================================
  # Startup Validation
  # ============================================
  devtools:
    restart:
      enabled: false

  # ============================================
  # Production Database Configuration
  # Uses environment variables for all credentials
  # ============================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      connection-test-query: "SELECT 1"

  # ============================================
  # Production JPA/Hibernate Configuration
  # Optimized for performance and safety
  # ============================================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: false
        jdbc:
          batch_size: 25
          fetch_size: 50
          use_scrollable_resultset: false
        order_inserts: true
        order_updates: true
        enable_lazy_load_no_trans: false

  # ============================================
  # Production Mail Configuration
  # ============================================
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          trust: "*"
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
          debug: false

  # ============================================
  # Production Task Execution Configuration
  # ============================================
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 500
      thread-name-prefix: npaxis-async-
      shutdown:
        await-termination: true
        await-termination-period: 60s
    scheduling:
      pool:
        size: 5
      thread-name-prefix: npaxis-scheduled-

  # ============================================
  # Production Error Handling
  # ============================================
  web:
    error:
      include-message: always
      include-stacktrace: on_param
      include-binding-errors: always
      include-exception: false

# ============================================
# Production Security Configuration
# ============================================
security:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      access: ${JWT_EXPIRATION_ACCESS:900000}
      refresh: ${JWT_EXPIRATION_REFRESH:604800000}

# ============================================
# Production NPAxis Configuration
# ============================================
npaxis:
  email:
    from-address: ${EMAIL_FROM_ADDRESS}
    from-name: ${EMAIL_FROM_NAME}
  cors:
    allowed-origins: ${NPAXIS_CORS_ALLOWED_ORIGINS:https://npaxis.com,https://www.npaxis.com}
  storage:
    local-directory: ${STORAGE_LOCAL_DIRECTORY:/var/app/npaxis/uploads}
    allowed-extensions: ${STORAGE_ALLOWED_EXTENSIONS:pdf,png,jpg,jpeg,doc,docx}
    cloud:
      bucket-name: ${CLOUD_BUCKET_NAME}
      region: ${CLOUD_REGION}
      access-key: ${CLOUD_ACCESS_KEY}
      secret-key: ${CLOUD_SECRET_KEY}

# ============================================
# Production DigitalOcean Configuration
# ============================================
digitalocean:
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:https://nyc3.digitaloceanspaces.com}
    region: ${DO_SPACES_REGION:nyc3}
    access-key: ${DO_SPACES_ACCESS_KEY}
    secret-key: ${DO_SPACES_SECRET_KEY}
    bucket-name: ${DO_SPACES_BUCKET}
    cdn-endpoint: ${DO_SPACES_CDN_ENDPOINT}
    max-file-size-bytes: 10485760
    presigned-url-expiry: PT1H
    allowed-origins:
      - https://npaxis.com
      - https://www.npaxis.com

# ============================================
# Production Stripe Configuration
# ============================================
payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    checkout:
      success-url: ${STRIPE_SUCCESS_URL}
      cancel-url: ${STRIPE_CANCEL_URL}
    portal:
      return-url: ${STRIPE_PORTAL_RETURN_URL}
    api-version: ${STRIPE_API_VERSION:2024-12-18.acacia}
    max-network-retries: ${STRIPE_MAX_NETWORK_RETRIES:3}
    connect-timeout-ms: ${STRIPE_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${STRIPE_READ_TIMEOUT_MS:10000}
    currency: ${STRIPE_CURRENCY:usd}
    trial:
      period-days: ${STRIPE_TRIAL_DAYS:14}

# ============================================
# Production Logging Configuration
# ============================================
logging:
  level:
    root: WARN
    org.springframework: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.springframework.data: WARN
    org.hibernate: ERROR
    org.postgresql: WARN
    com.digitalearn.npaxis: INFO
  file:
    name: ${LOG_FILE_PATH:-}/npaxis.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# ============================================
# Production Server Configuration
# IMPORTANT: DigitalOcean App Platform uses PORT env variable
# Binds to 0.0.0.0 to accept connections from load balancers
# ============================================
server:
  address: 0.0.0.0
  port: ${PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
  shutdown: graceful
  servlet:
    context-path: /api/v1
  tomcat:
    threads:
      max: 200
      min-spare: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 30000

# ============================================
# Production SpringDoc/Swagger Configuration
# Disabled for security
# ============================================
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ============================================
# Production Storage Configuration
# ============================================
storage:
  bucket:
    initialize: true

# ============================================
# Production Actuator Configuration
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      enabled: true
      show-details: when-authorized
      show-components: when-authorized
    info:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    diskspace:
      threshold: 1GB
    db:
      enabled: true
  server:
    port: 8080
    ssl:
      enabled: false
