spring:
  application:
    name: npaxis
  profiles:
    active: prod

  # ============================================
  # Flyway Database Migration Configuration
  # Universal settings - same for all environments
  # ============================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    sql-migration-prefix: V
    sql-migration-separator: __
    placeholders-replacement: true

  # ============================================
  # Default Datasource Configuration
  # Overridden by profile-specific configs
  # ============================================
  datasource:
    driver-class-name: org.postgresql.Driver

  # ============================================
  # Default JPA/Hibernate Configuration
  # ============================================
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# ============================================
# Logging Configuration - Pattern Templates
# Environment-specific levels defined in each profile
# ============================================
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36}:%line - %msg%n"
  config: classpath:logback-spring.xml

# ============================================
# CORS Configuration
# Profile-specific overrides in application-{profile}.yml
# ============================================
npaxis:
  cors:
    allowed-origins: ${NPAXIS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

# ============================================
# Messaging System Configuration
# Asynchronous messaging between students and preceptors
# ============================================
messaging:
  pagination:
    default-page-size: 10
    max-page-size: 100
    default-message-size: 20
    max-message-size: 50
  message:
    max-content-length: 5000
    min-content-length: 1
  notification:
    retention-days: 90
    auto-clean-enabled: false

# ============================================
# Actuator Configuration
# Exposed endpoints for health and monitoring
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized


