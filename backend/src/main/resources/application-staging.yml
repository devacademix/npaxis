spring:
  application:
    name: npaxis

  # ============================================
  # Staging Database Configuration
  # ============================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ============================================
  # Staging JPA/Hibernate Configuration
  # ============================================
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: false

  # ============================================
  # Staging Mail Configuration
  # ============================================
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          trust: "*"
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000
          debug: false

  # ============================================
  # Staging Task Execution Configuration
  # ============================================
  task:
    execution:
      pool:
        core-size: 3
        max-size: 10
        queue-capacity: 250
      thread-name-prefix: npaxis-async-

# ============================================
# Staging Security Configuration
# ============================================
security:
  jwt:
    secret: ${JWT_SECRET}
    expiration:
      access: ${JWT_EXPIRATION_ACCESS}
      refresh: ${JWT_EXPIRATION_REFRESH}

# ============================================
# Staging NPAxis Configuration
# ============================================
npaxis:
  email:
    from-address: ${EMAIL_FROM_ADDRESS}
    from-name: ${EMAIL_FROM_NAME}
  cors:
    allowed-origins: ${NPAXIS_CORS_ALLOWED_ORIGINS:https://staging.npaxis.com,https://www.staging.npaxis.com}
  storage:
    local-directory: ${STORAGE_LOCAL_DIRECTORY}
    allowed-extensions: ${STORAGE_ALLOWED_EXTENSIONS}
    cloud:
      bucket-name: ${CLOUD_BUCKET_NAME}
      region: ${CLOUD_REGION}
      access-key: ${CLOUD_ACCESS_KEY}
      secret-key: ${CLOUD_SECRET_KEY}

# ============================================
# Staging DigitalOcean Configuration
# ============================================
digitalocean:
  spaces:
    endpoint: ${DO_SPACES_ENDPOINT:https://nyc3.digitaloceanspaces.com}
    region: ${DO_SPACES_REGION:nyc3}
    access-key: ${DO_SPACES_ACCESS_KEY}
    secret-key: ${DO_SPACES_SECRET_KEY}
    bucket-name: ${DO_SPACES_BUCKET}
    cdn-endpoint: ${DO_SPACES_CDN_ENDPOINT}
    max-file-size-bytes: 10485760
    presigned-url-expiry: PT1H
    allowed-origins:
      - https://staging.npaxis.com

# ============================================
# Staging Stripe Configuration
# ============================================
payment:
  stripe:
    secret-key: ${STRIPE_SECRET_KEY}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET}
    checkout:
      success-url: ${STRIPE_SUCCESS_URL}
      cancel-url: ${STRIPE_CANCEL_URL}
    portal:
      return-url: ${STRIPE_PORTAL_RETURN_URL}
    api-version: ${STRIPE_API_VERSION:2024-12-18.acacia}
    max-network-retries: ${STRIPE_MAX_NETWORK_RETRIES:3}
    connect-timeout-ms: ${STRIPE_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${STRIPE_READ_TIMEOUT_MS:10000}
    currency: ${STRIPE_CURRENCY:usd}
    trial:
      period-days: ${STRIPE_TRIAL_DAYS:14}

# ============================================
# Staging Logging Configuration
# ============================================
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.springframework.security: INFO
    org.springframework.data: INFO
    org.hibernate: WARN
    org.postgresql: INFO
    com.digitalearn.npaxis: DEBUG


# ============================================
# Staging Server Configuration
# ============================================
server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
  shutdown: graceful
  servlet:
    context-path: /api/v1

# ============================================
# Staging SpringDoc/Swagger Configuration
# Can be enabled for testing but should be disabled before prod
# ============================================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# ============================================
# Staging Storage Configuration
# Bucket initialization enabled to test with real credentials
# ============================================
storage:
  bucket:
    initialize: true

