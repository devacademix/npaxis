name: Build and Deploy to DigitalOcean App Platform

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Validate configuration
        run: |
          echo "Validating pom.xml and application configuration..."
          cd backend
          mvn validate
      
      - name: Build with Maven
        run: |
          cd backend
          mvn clean package -DskipTests
      
      - name: Run unit tests
        run: |
          cd backend
          mvn test
      
      - name: SonarQube scan (if configured)
        if: env.SONAR_HOST_URL != ''
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
        run: |
          cd backend
          mvn sonar:sonar \
            -Dsonar.projectKey=npaxis \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_LOGIN
      
      - name: Check code quality
        run: |
          cd backend
          echo "Running quality checks..."
          mvn checkstyle:check
      
      - name: Upload test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-tests

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install DigitalOcean CLI
        run: |
          cd ~
          wget https://github.com/digitalocean/doctl/releases/download/v1.94.0/doctl-1.94.0-linux-amd64.tar.gz
          tar xf ~/doctl-1.94.0-linux-amd64.tar.gz
          sudo mv ~/doctl /usr/local/bin
      
      - name: Authenticate with DigitalOcean
        run: |
          doctl auth init --access-token ${{ secrets.DIGITALOCEAN_TOKEN }}
      
      - name: Deploy to App Platform
        run: |
          cd backend
          echo "Deploying to DigitalOcean App Platform..."
          doctl apps create-deployment ${{ secrets.DIGITALOCEAN_APP_ID }} || true
      
      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30
      
      - name: Verify deployment
        run: |
          cd backend
          HEALTH_ENDPOINT="${{ secrets.DIGITALOCEAN_APP_URL }}/api/v1/actuator/health/live"
          max_attempts=30
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_ENDPOINT")
            
            if [ "$response" = "200" ]; then
              echo "✓ Application is healthy!"
              exit 0
            fi
            
            echo "Attempt $((attempt+1))/$max_attempts: Health check returned $response"
            attempt=$((attempt+1))
            sleep 5
          done
          
          echo "✗ Deployment verification failed - health check did not return 200"
          exit 1
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "✓ Application successfully deployed to production!"
      
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "✗ Deployment failed! Check logs above."
          exit 1

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
